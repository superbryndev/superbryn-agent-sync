name: Publish to PyPI

# The version in pyproject.toml is the single source of truth. This workflow
# never bumps it: it publishes the declared version if (and only if) it is not
# already on PyPI and has a matching CHANGELOG entry. To release, bump the
# version (e.g. `bump2version minor` keeps pyproject.toml, __about__.py and
# the README badge in lockstep), run `uv lock`, add the CHANGELOG section,
# and merge to main.

on:
  push:
    branches:
      - main
    paths:
      - 'superbryn/**'
      - 'pyproject.toml'
      - 'README.md'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine tomli

      - name: Resolve declared version
        id: version
        run: |
          VERSION=$(python -c "import tomli; print(tomli.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "Declared version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          ABOUT_VERSION=$(python -c "import re; print(re.search(r'__version__ = \"(.+?)\"', open('superbryn/__about__.py').read()).group(1))")
          if [ "$VERSION" != "$ABOUT_VERSION" ]; then
            echo "::error::pyproject.toml ($VERSION) and superbryn/__about__.py ($ABOUT_VERSION) disagree"
            exit 1
          fi

      - name: Check whether version is already on PyPI
        id: pypi
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if pip index versions superbryn-agent-sync 2>/dev/null | grep -q "$VERSION"; then
            echo "Version $VERSION already published — nothing to do."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION not on PyPI — will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Require matching CHANGELOG entry
        if: steps.pypi.outputs.publish == 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [$VERSION]' section — add one before releasing"
            exit 1
          fi

      - name: Build package
        if: steps.pypi.outputs.publish == 'true'
        run: python -m build

      - name: Publish to PyPI
        if: steps.pypi.outputs.publish == 'true'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
