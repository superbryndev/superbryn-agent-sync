name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,async]"

      - name: Lint (ruff)
        run: ruff check superbryn tests

      - name: Format check (ruff format)
        run: ruff format --check superbryn tests

      - name: Pytest
        run: pytest -q

  build-verify:
    name: Build and install wheel in clean env
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: twine check
        run: twine check dist/*

      - name: Install wheel in fresh venv and import
        run: |
          python -m venv /tmp/verify-env
          /tmp/verify-env/bin/pip install --upgrade pip
          /tmp/verify-env/bin/pip install dist/*.whl
          # run from /tmp so the installed wheel is imported, not the checkout
          cd /tmp && /tmp/verify-env/bin/python -c "
          from superbryn import Superbryn, Manifest, compute_manifest_hash, load_manifest_schema, __version__
          print('version:', __version__)
          manifest = Manifest.builder(source='custom').set_identity(name='ci-check').build()
          print('hash:', compute_manifest_hash(manifest))
          client = Superbryn(api_key='dummy')
          schema = load_manifest_schema()
          assert schema, 'bundled schema missing'
          print('wheel install OK')
          "

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14
